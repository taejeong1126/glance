name: forked repo
on:
    push:
        branches:
            - main

jobs:
    sync:
        name: Sync forked repo
        runs-on: ubuntu-latest

        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.AUTO_ACTIONS }}
                  fetch-depth: 0
                  ref: main

            - name: Add remote-url
              run: |
                  git remote add forked-repo https://taejeong1126:${{ secrets.AUTO_ACTIONS }}@github.com/taejeong1126/glance-fork

                  git config user.name taejeong1126
                  git config user.email ${{ secrets.OFFICIAL_ACCOUNT_EMAIL }}

            - name: Push changes to forked-repo
              run: |
                  git push -f forked-repo main

            - name: Clean up
              run: |
                  git remote remove forked-repo
